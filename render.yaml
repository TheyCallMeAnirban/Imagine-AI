services:
  - type: web
    name: imaginai
    plan: free
    runtime: python
    buildCommand: "chmod +x render-build.sh && ./render-build.sh"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "20"
